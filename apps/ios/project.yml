name: OpenFrame
options:
  bundleIdPrefix: us.openframe
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "13"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: "5.9.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "7.12.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"

targets:
  OpenFrame:
    type: application
    platform: iOS
    sources:
      - path: OpenFrame
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: Alamofire
      - package: Kingfisher
      - package: KeychainAccess
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: us.openframe.app
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: OpenFrame/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
    info:
      path: OpenFrame/Resources/Info.plist
    entitlements:
      path: OpenFrame/Resources/OpenFrame.entitlements
