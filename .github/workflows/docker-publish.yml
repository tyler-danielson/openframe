name: Build & Publish Docker Images

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/tyler-danielson/openframe

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta for App (self-hosted)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-app
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker meta for App (cloud)
        id: meta-cloud
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-app
          tags: |
            type=raw,value=cloud,enable={{is_default_branch}}
            type=raw,value=cloud-{{sha}}

      - name: Docker meta for Bot
        id: meta-bot
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-bot
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push App image (self-hosted)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.combined
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push App image (cloud)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.combined
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_BASE_PATH=/app/
            VITE_CLOUD_MODE=true
          tags: ${{ steps.meta-cloud.outputs.tags }}
          labels: ${{ steps.meta-cloud.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.bot
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-bot.outputs.tags }}
          labels: ${{ steps.meta-bot.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
